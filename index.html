<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나비엠알오 일정 및 연락처</title>

<link href="https://cdn.jsdelivr.net/gh/moonspam/NanumSquareRound@1.0/nanumsquareround.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: "NanumSquareRound", "Noto Sans KR", sans-serif;
    background: linear-gradient(135deg, #f4f6f8, #e8edf2);
}

.container {
    width: 950px;
    margin: 40px auto;
    background: #ffffff;
    border-radius: 12px;
    padding: 30px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.title {
    text-align: center;
    font-size: 32px;
    font-weight: 600;
    color: #ff6a00;
    margin-bottom: 30px;
}

.section {
    margin-bottom: 30px;
}

.section-title {
    font-weight: bold;
    margin-bottom: 10px;
    color: #ff6a00;
}

input, select {
    padding: 8px;
    margin: 4px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 13px;
}

.schedule-row, .contact-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 8px;
}

.schedule-row input[type="text"] {
    width: 300px;
}

button {
    width: 100%;
    padding: 15px;
    background: #ff6a00;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #e65c00;
}
</style>

<script>
// 날짜 자동 입력
function autoFillEnd(startId, endId) {
    const start = document.getElementById(startId).value;
    document.getElementById(endId).value = start;
}

// 제출 처리 (수정 완료 버전)
function showThankYouMessage(e){
    e.preventDefault();

    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());

    fetch("https://lkhj.app.n8n.cloud/webhook/monthly-report", {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify(data)
})
    .then(() => {
        alert("제출되었습니다.");
        e.target.reset();
    })
    .catch(() => {
        alert("전송 실패. 다시 시도해주세요.");
    });
}
</script>

</head>

<body>

<div class="container">

<div class="title">
나비엠알오 일정 및 연락처
</div>

<form onsubmit="showThankYouMessage(event)">

<div class="section">
<div class="section-title">부서</div>
<input type="text" name="dept" placeholder="예: 인사총무팀">
</div>

<div class="section">
<div class="section-title">일정 입력 (최대 10개)</div>

<script>
for(let i=1;i<=10;i++){
document.write(`
<div class="schedule-row">
<input type="date" name="start${i}" id="start${i}" onchange="autoFillEnd('start${i}','end${i}')">
~
<input type="date" name="end${i}" id="end${i}">
<input type="text" name="schedule${i}" placeholder="예: 출장 / 회의 / 교육 등">
</div>
`);
}
</script>

</div>

<div class="section">
<div class="section-title">연락처 입력 (최대 5개)</div>

<script>
for(let i=1;i<=5;i++){
document.write(`
<div class="contact-row">
<input type="text" name="name${i}" placeholder="이름">
<input type="text" name="ext${i}" placeholder="내선번호 (예: 4473-0392)">
<input type="text" name="phone${i}" placeholder="핸드폰번호 (예: 010-0000-0000)">
<input type="text" name="job${i}" placeholder="직무">
<select name="status${i}">
<option value="추가">추가</option>
<option value="수정">수정</option>
<option value="삭제">삭제</option>
</select>
</div>
`);
}
</script>

</div>

<button type="submit">제출</button>

</form>

</div>

</body>
</html>
